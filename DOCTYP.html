<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Weather Dashboard - Temp & Humidity</title>
    <!-- Font chữ điện tử -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505; 
            --card-bg: #151515; /* Sáng hơn nền một chút để không bị chìm */
            --text-main: #ffffff;
            --text-muted: #888888; 
            --glow-blue: #00e5ff; 
            --glow-orange: #ffaa00;
            --glow-green: #00ff00; 
            --glow-red: #ff3333;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .unit-toggle { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            z-index: 100;
            transition: 0.3s;
        }

        .unit-toggle:hover { 
            background: #444; 
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            max-width: 800px; 
            width: 100%; 
        }
        
        .card { 
            background-color: var(--card-bg); 
            border-radius: 15px; 
            padding: 30px; 
            /* Đổ bóng để thẻ nổi bật lên, không bị đen thui */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); 
            border: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            min-height: 280px;
        }
        
        .digital-font { 
            font-family: 'Share Tech Mono', monospace; 
            line-height: 1; 
        }

        .title { 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 20px; 
            color: var(--text-muted); 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        /* Hiệu ứng phát sáng chữ */
        .text-orange { color: var(--glow-orange); text-shadow: 0 0 15px rgba(255, 170, 0, 0.5); }
        .text-blue { color: var(--glow-blue); text-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }
        .text-green { color: var(--glow-green); } 
        
        .sensor-data { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: auto 0;
        }
        
        .temp-value, .humid-value { 
            font-size: 8rem; 
            letter-spacing: -3px; 
        } 

        .unit { 
            font-size: 2.5rem; 
            vertical-align: super; 
            margin-left: 5px; 
            font-family: sans-serif; 
            color: #ddd;
        }
        
        .status-bar { 
            display: flex; 
            gap: 10px; 
            margin-top: 20px; 
            font-size: 0.8rem; 
            justify-content: center; 
        }

        .status-badge { 
            padding: 5px 15px; 
            border-radius: 12px; 
            background: #2a2a2a; 
            color: #666; 
            transition: all 0.3s ease;
        }

        .status-badge.active.good { background: var(--glow-green); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--glow-green); }
        .status-badge.active.dry { background: var(--glow-orange); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--glow-orange);}
        .status-badge.active.humid { background: var(--glow-blue); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--glow-blue);}
        
        .value-update { 
            animation: flashUpdate 0.5s ease-out; 
        }

        @keyframes flashUpdate { 
            0% { opacity: 0.5; transform: scale(0.95); filter: brightness(1.5); } 
            50% { opacity: 1; transform: scale(1.05); } 
            100% { transform: scale(1); filter: brightness(1); } 
        }
        
        @media (max-width: 768px) { 
            .dashboard { grid-template-columns: 1fr; } 
            .temp-value, .humid-value { font-size: 6rem; } 
            .card { min-height: 220px; padding: 20px; }
        }
    </style>
</head>
<body>

    <button id="unitBtn" class="unit-toggle">Đổi °C / °F</button>

    <div class="dashboard">
        <!-- Khung Nhiệt Độ -->
        <div class="card" style="border-top: 3px solid var(--glow-orange);">
            <div class="title">
                <span class="text-orange">TEMPERATURE</span> 
                <span style="font-size: 1.5rem;">🌡️</span>
            </div>
            <div class="sensor-data text-orange">
                <div>
                    <span class="digital-font temp-value" id="inTemp">0.0</span>
                    <span class="unit temp-unit">°C</span>
                </div>
            </div>
        </div>

        <!-- Khung Độ Ẩm -->
        <div class="card" style="border-top: 3px solid var(--glow-blue);">
            <div class="title">
                <span class="text-blue">HUMIDITY</span> 
                <span style="font-size: 1.5rem;">💧</span>
            </div>
            <div class="sensor-data text-blue">
                <div>
                    <span class="digital-font humid-value" id="inHum">0</span>
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="status-bar">
                <span class="status-badge dry" id="inDryBadge">DRY</span>
                <span class="status-badge good active" id="inGoodBadge">GOOD</span>
                <span class="status-badge humid" id="inHumidBadge">HUMID</span>
            </div>
        </div>
    </div>

    <!-- CHÚ Ý: Đặt thư viện E-Ra ở cuối body để không bị lỗi trắng/đen màn hình -->
    <script src="https://eoh-jsc.github.io/era-widget/era_widget.js"></script>
    
    <script>
        let isCelsius = true;
        let currentInTemp = 0; // Biến lưu tạm để đổi C/F

        // Hàm tạo hiệu ứng nháy khi có dữ liệu mới
        function animateValue(elementId) {
            const el = document.getElementById(elementId);
            if(el) {
                el.classList.remove('value-update');
                void el.offsetWidth; // Kích hoạt lại animation
                el.classList.add('value-update');
            }
        }

        // Công thức đổi độ C sang độ F
        function cToF(celsius) { 
            return (celsius * 9/5) + 32; 
        }

        // Cập nhật giá trị nhiệt độ lên màn hình
        function updateSensorData(sensorId, rawValueC) {
            const displayVal = isCelsius ? rawValueC : cToF(rawValueC);
            const el = document.getElementById(sensorId);
            if(el) {
                el.innerText = displayVal.toFixed(1);
                animateValue(sensorId);
            }
        }

        // Cập nhật thanh trạng thái độ ẩm (Khô / Tốt / Ẩm ướt)
        function updateIndoorStatus(humidity) {
            document.getElementById('inHumidBadge').classList.remove('active');
            document.getElementById('inGoodBadge').classList.remove('active');
            document.getElementById('inDryBadge').classList.remove('active');

            if (humidity < 30) {
                document.getElementById('inDryBadge').classList.add('active');
            } else if (humidity > 60) {
                document.getElementById('inHumidBadge').classList.add('active');
            } else {
                document.getElementById('inGoodBadge').classList.add('active');
            }
        }

        // --- TÍCH HỢP E-RA IOT NHẬN DỮ LIỆU THỰC TẾ ---
        // Sử dụng try...catch để nếu ERA chưa sẵn sàng thì web không bị chết (không bị đen thui)
        try {
            const eraWidget = new EraWidget();
            eraWidget.init({
                onRealtime: function(data) {
                    // Cập nhật Nhiệt độ (data[0] ứng với V1)
                    if (data && data[0] !== undefined && data[0] !== null) {
                        currentInTemp = data[0];
                        updateSensorData('inTemp', data[0]);
                    }
                    
                    // Cập nhật Độ ẩm (data[1] ứng với V2)
                    if (data && data[1] !== undefined && data[1] !== null) {
                        const humidVal = parseInt(data[1]);
                        document.getElementById('inHum').innerText = humidVal;
                        animateValue('inHum');
                        updateIndoorStatus(humidVal);
                    }
                }
            });
        } catch (error) {
            console.error("Lỗi khởi tạo E-Ra Widget. Vui lòng kiểm tra lại môi trường nhúng:", error);
        }

        // Xử lý sự kiện khi bấm nút Đổi °C / °F
        document.getElementById('unitBtn').addEventListener('click', () => {
            isCelsius = !isCelsius;
            document.querySelectorAll('.temp-unit').forEach(u => u.innerText = isCelsius ? '°C' : '°F');
            updateSensorData('inTemp', currentInTemp); 
        });

    </script>
</body>
</html>
